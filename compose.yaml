services:
  ###> doctrine/doctrine-bundle ###
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: stock-market
      MYSQL_PASSWORD: bach-beethoven-brahms
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: stock-market
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "20001:3306"
    volumes:
      - database_data:/var/lib/mysql:rw
###< doctrine/doctrine-bundle ###

volumes:
  ###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
