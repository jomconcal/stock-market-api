name: CI

on:
    push:
    pull_request:

jobs:
    quality:
        runs-on: ubuntu-latest
        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: stock-market_test
                    MYSQL_USER: user_test
                    MYSQL_PASSWORD: password_test
                ports:
                    - 3306:3306
        env:
            APP_ENV: test

            DB_USER: user_test
            DB_PASSWORD: password_test
            DB_HOST: 127.0.0.1
            DB_PORT: 3306
            DB_NAME: stock-market

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  extensions: mbstring, xml, intl, pdo_sqlite

            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Create database schema
              run: php bin/console doctrine:schema:create --env=test --no-interaction

            - name: Tests
              run: vendor/bin/phpunit

            - name: CS Fixer
              run: vendor/bin/php-cs-fixer fix --dry-run --diff

            - name: PHPStan
              run: vendor/bin/phpstan analyse

            - name: Psalm
              run: vendor/bin/psalm

            - name: Deptrac
              run: vendor/bin/deptrac analyse --report-uncovered

            - name: Rector
              run: vendor/bin/rector process --dry-run

